<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Cinzel:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1612;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Cinzel', serif;
        }

        .qr-card {
            background: #f4f1ea;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid #d4af37; /* Gold Border */
            position: relative;
        }

        /* Decorative Corners */
        .qr-card::before, .qr-card::after {
            content: '✿';
            position: absolute;
            color: #d4af37;
            font-size: 24px;
        }
        .qr-card::before { top: 10px; left: 10px; }
        .qr-card::after { bottom: 10px; right: 10px; }

        #qrcode {
            padding: 20px;
            background: white;
            border-radius: 4px;
            display: inline-block;
            border: 1px solid #c4b499;
        }

        h2 {
            color: #7a1a1a;
            margin-bottom: 25px;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        p {
            font-family: 'Caveat', cursive;
            color: #3a352f;
            font-size: 1.8rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="qr-card">
        <h2>A Special Surprise</h2>
        <div id="qrcode"></div>
        <p>Scan to Open</p>
    </div>

    <script>
        // Link: https://taubdaygift.vercel.app/
        var qrcode = new QRCode(document.getElementById("qrcode"), {
            text: "https://taubdaygift.vercel.app/",
            width: 250,
            height: 250,
            colorDark : "#7a1a1a", // Deep Burgundy to match the ribbon
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });
    </script>
</body>
</html>
